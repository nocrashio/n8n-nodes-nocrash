name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly scan, Mondays 07:00 UTC.
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (JS/TS)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      # actions/checkout@v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # github/codeql-action/init@codeql-bundle-v2.25.6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496
        with:
          languages: ${{ matrix.language }}

      # github/codeql-action/analyze@codeql-bundle-v2.25.6
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496
        with:
          category: '/language:${{ matrix.language }}'
