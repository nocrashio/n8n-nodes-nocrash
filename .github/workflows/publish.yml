# Publishes n8n-nodes-nocrash to npm on every version tag push.
#
# Uses npm OIDC Trusted Publishing (no long-lived NPM_TOKEN secret) plus an
# npm provenance attestation, satisfying n8n's post-2026-05-01 requirement that
# community nodes be published via GitHub Actions with provenance.
#
# ─── ONE-TIME SETUP (OIDC Trusted Publishing) ──────────────────────────────────
#   1. npmjs.com -> package settings -> Publishing access -> Trusted Publishers.
#   2. Add a GitHub Actions publisher:
#        Repository owner: nocrash-io
#        Repository name:  n8n-nodes-nocrash
#        Workflow name:    publish.yml
#        Environment:      npm-publish
#   3. Leave NPM_TOKEN UNSET. GitHub's OIDC token is exchanged instead.
#
# The `npm-publish` GitHub Environment gates publish behind any required
# reviewers/branch rules configured on that environment (owner action).

name: Publish

on:
  push:
    tags:
      - '*.*.*'

# Least privilege at the workflow level.
permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    # Gate publishing behind the npm-publish environment (owner-configured).
    environment: npm-publish

    permissions:
      # Required to mint an OIDC token for npm provenance + trusted publishing.
      id-token: write
      contents: read

    steps:
      # actions/checkout@v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-node@v6.4.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # OIDC trusted publishing: no NPM_TOKEN. Provenance is signed by GitHub's
      # OIDC infrastructure. Requires npm CLI >= 11.5.1 (Node 22 toolchain ships it).
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
